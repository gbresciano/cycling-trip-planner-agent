<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Cycling trip planner — chat</title>
    <style>
      :root {
        font-family: system-ui, sans-serif;
        color-scheme: light dark;
      }
      body {
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        max-width: 760px;
        margin-inline: auto;
        padding: 1rem;
        box-sizing: border-box;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 0.75rem;
      }
      header h1 {
        font-size: 1.1rem;
        margin: 0;
      }
      header .meta {
        font-size: 0.8rem;
        opacity: 0.7;
        font-family: ui-monospace, monospace;
      }
      #log {
        flex: 1;
        overflow-y: auto;
        border: 1px solid rgba(127, 127, 127, 0.3);
        border-radius: 6px;
        padding: 0.75rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .msg {
        padding: 0.5rem 0.75rem;
        border-radius: 6px;
        white-space: pre-wrap;
        line-height: 1.4;
        max-width: 85%;
      }
      .msg.user {
        align-self: flex-end;
        background: rgba(80, 130, 255, 0.18);
      }
      .msg.assistant {
        align-self: flex-start;
        background: rgba(127, 127, 127, 0.15);
      }
      .msg.error {
        align-self: stretch;
        background: rgba(220, 80, 80, 0.18);
        font-family: ui-monospace, monospace;
        font-size: 0.85rem;
      }
      .msg .role {
        font-size: 0.7rem;
        opacity: 0.6;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.2rem;
      }
      form {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.75rem;
      }
      textarea {
        flex: 1;
        resize: none;
        padding: 0.5rem;
        font: inherit;
        border-radius: 6px;
        border: 1px solid rgba(127, 127, 127, 0.4);
        background: transparent;
        color: inherit;
      }
      button {
        padding: 0 1rem;
        font: inherit;
        border-radius: 6px;
        border: 1px solid rgba(127, 127, 127, 0.4);
        background: rgba(80, 130, 255, 0.2);
        color: inherit;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Cycling trip planner</h1>
      <div class="meta">
        <span id="convId">no conversation yet</span>
        &nbsp;·&nbsp;
        <a href="#" id="reset">new conversation</a>
      </div>
    </header>
    <div id="log"></div>
    <form id="form">
      <textarea
        id="input"
        rows="2"
        placeholder="Ask about a cycling trip… (Enter to send, Shift+Enter for newline)"
        autofocus
      ></textarea>
      <button type="submit" id="send">Send</button>
    </form>

    <script>
      const logEl = document.getElementById("log");
      const formEl = document.getElementById("form");
      const inputEl = document.getElementById("input");
      const sendEl = document.getElementById("send");
      const convIdEl = document.getElementById("convId");
      const resetEl = document.getElementById("reset");

      let conversationId = null;

      function addMessage(role, text) {
        const el = document.createElement("div");
        el.className = "msg " + role;
        const roleEl = document.createElement("div");
        roleEl.className = "role";
        roleEl.textContent = role;
        const bodyEl = document.createElement("div");
        bodyEl.textContent = text;
        el.append(roleEl, bodyEl);
        logEl.append(el);
        logEl.scrollTop = logEl.scrollHeight;
      }

      function setConvId(id) {
        conversationId = id;
        convIdEl.textContent = id ? "conv " + id.slice(0, 8) : "no conversation yet";
      }

      resetEl.addEventListener("click", (e) => {
        e.preventDefault();
        setConvId(null);
        logEl.innerHTML = "";
        inputEl.focus();
      });

      async function send(message) {
        const body = { message };
        if (conversationId) body.conversationId = conversationId;

        const res = await fetch("/chat", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(body),
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          const detail = data && (data.error || data.message) ? JSON.stringify(data) : res.statusText;
          throw new Error(res.status + " " + detail);
        }
        return data;
      }

      formEl.addEventListener("submit", async (e) => {
        e.preventDefault();
        const text = inputEl.value.trim();
        if (!text) return;

        inputEl.value = "";
        sendEl.disabled = true;
        addMessage("user", text);

        try {
          const data = await send(text);
          if (data.conversationId) setConvId(data.conversationId);
          addMessage("assistant", data.assistantMessage ?? "(no reply)");
        } catch (err) {
          addMessage("error", String(err.message || err));
        } finally {
          sendEl.disabled = false;
          inputEl.focus();
        }
      });

      inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          formEl.requestSubmit();
        }
      });
    </script>
  </body>
</html>
