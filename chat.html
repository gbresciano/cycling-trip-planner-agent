<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Cycling trip planner — chat</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚴</text></svg>"
    />
    <style>
      :root {
        font-family: system-ui, sans-serif;
        color-scheme: light dark;
      }
      body {
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        max-width: 760px;
        margin-inline: auto;
        padding: 1rem;
        box-sizing: border-box;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 0.75rem;
      }
      header h1 {
        font-size: 1.1rem;
        margin: 0;
      }
      header .meta {
        font-size: 0.8rem;
        opacity: 0.7;
        font-family: ui-monospace, monospace;
      }
      #log {
        flex: 1;
        overflow-y: auto;
        border: 1px solid rgba(127, 127, 127, 0.3);
        border-radius: 6px;
        padding: 0.75rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .msg {
        padding: 0.5rem 0.75rem;
        border-radius: 6px;
        white-space: pre-wrap;
        line-height: 1.4;
        max-width: 85%;
      }
      .msg.user {
        align-self: flex-end;
        background: rgba(80, 130, 255, 0.18);
      }
      .msg.assistant {
        align-self: flex-start;
        background: rgba(127, 127, 127, 0.15);
      }
      .msg.error {
        align-self: stretch;
        background: rgba(220, 80, 80, 0.18);
        font-family: ui-monospace, monospace;
        font-size: 0.85rem;
      }
      .msg .role {
        font-size: 0.7rem;
        opacity: 0.6;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.2rem;
      }
      form {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.75rem;
      }
      textarea {
        flex: 1;
        resize: none;
        padding: 0.5rem;
        font: inherit;
        border-radius: 6px;
        border: 1px solid rgba(127, 127, 127, 0.4);
        background: transparent;
        color: inherit;
      }
      button {
        padding: 0 1rem;
        font: inherit;
        border-radius: 6px;
        border: 1px solid rgba(127, 127, 127, 0.4);
        background: rgba(80, 130, 255, 0.2);
        color: inherit;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      #plan,
      .inline-plan {
        border: 1px solid rgba(127, 127, 127, 0.3);
        border-radius: 6px;
        padding: 0.5rem 0.75rem;
        font-size: 0.85rem;
      }
      #plan {
        margin-bottom: 0.5rem;
      }
      .inline-plan {
        align-self: stretch;
      }
      #plan[hidden] {
        display: none;
      }
      #plan summary,
      .inline-plan summary {
        cursor: pointer;
        font-weight: 600;
      }
      #plan .summary-text,
      .inline-plan .summary-text {
        margin: 0.5rem 0;
        line-height: 1.4;
      }
      #plan table,
      .inline-plan table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.8rem;
      }
      #plan th,
      #plan td,
      .inline-plan th,
      .inline-plan td {
        text-align: left;
        padding: 0.35rem 0.5rem;
        border-bottom: 1px solid rgba(127, 127, 127, 0.2);
        vertical-align: top;
      }
      #plan th,
      .inline-plan th {
        font-weight: 600;
        opacity: 0.75;
      }
      #plan tr:last-child td,
      .inline-plan tr:last-child td {
        border-bottom: none;
      }
      #plan .num,
      .inline-plan .num {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      #plan .weather,
      .inline-plan .weather {
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Cycling trip planner</h1>
      <div class="meta">
        <span id="convId">no conversation yet</span>
        &nbsp;·&nbsp;
        <a href="#" id="reset">new conversation</a>
      </div>
    </header>
    <details id="plan" hidden>
      <summary>Current plan</summary>
      <p class="summary-text"></p>
      <table>
        <thead>
          <tr>
            <th>Day</th>
            <th>Date</th>
            <th>From → To</th>
            <th class="num">Dist</th>
            <th class="num">Elev↑</th>
            <th>Weather</th>
            <th>Stay</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </details>
    <div id="log"></div>
    <form id="form">
      <textarea id="input" rows="2" placeholder="Ask about a cycling trip… (Enter to send, Shift+Enter for newline)" autofocus></textarea>
      <button type="submit" id="send">Send</button>
    </form>

    <script>
      const logEl = document.getElementById("log");
      const formEl = document.getElementById("form");
      const inputEl = document.getElementById("input");
      const sendEl = document.getElementById("send");
      const convIdEl = document.getElementById("convId");
      const resetEl = document.getElementById("reset");
      const planEl = document.getElementById("plan");
      const planSummaryEl = planEl.querySelector(".summary-text");
      const planBodyEl = planEl.querySelector("tbody");

      // Match the agent's free-form `weather.conditions` string to an
      // emoji. Ordering matters: "partly cloudy" must hit ⛅ before "cloud"
      // would grab it, and "thunderstorm" must hit ⛈️ before "storm" or
      // "rain" claim it.
      const WEATHER_EMOJI = [
        [/thunder|storm/, "⛈️"],
        [/snow|sleet|blizzard/, "❄️"],
        [/rain|drizzle|shower/, "🌧️"],
        [/fog|mist|haze/, "🌫️"],
        [/partly|partial|mostly/, "⛅"],
        [/cloud|overcast/, "☁️"],
        [/sun|clear|fair/, "☀️"],
        [/wind/, "💨"],
      ];
      function weatherEmoji(conditions) {
        const text = (conditions || "").toLowerCase();
        for (const [re, emoji] of WEATHER_EMOJI) {
          if (re.test(text)) return emoji;
        }
        return "🌡️";
      }

      function placeName(point) {
        if (!point) return "?";
        if (point.name) return point.name;
        return point.latitude.toFixed(2) + "," + point.longitude.toFixed(2);
      }

      function buildPlanRow(seg) {
        const tr = document.createElement("tr");
        const w = seg.weather || {};
        const cells = [
          { text: String(seg.day) },
          { text: seg.date },
          { text: placeName(seg.start) + " → " + placeName(seg.end) },
          { text: Math.round(seg.route.distanceKm) + " km", cls: "num" },
          {
            text: Math.round(seg.route.elevation.totalGainM) + " m",
            cls: "num",
          },
          {
            text: weatherEmoji(w.conditions) + " " + Math.round(w.temperatureMinC) + "–" + Math.round(w.temperatureMaxC) + "°C",
            title: w.conditions,
            cls: "weather",
          },
          { text: seg.accommodation ? seg.accommodation.name : "—" },
        ];
        for (const cell of cells) {
          const td = document.createElement("td");
          td.textContent = cell.text;
          if (cell.cls) td.className = cell.cls;
          if (cell.title) td.title = cell.title;
          tr.append(td);
        }
        return tr;
      }

      function renderPlan(plan) {
        if (!plan) {
          planEl.hidden = true;
          planSummaryEl.textContent = "";
          planBodyEl.replaceChildren();
          return;
        }
        planEl.hidden = false;
        planSummaryEl.textContent = plan.summary || "";
        planBodyEl.replaceChildren(...(plan.segments || []).map(buildPlanRow));
      }

      const PLAN_HEADERS = [
        ["Day", ""],
        ["Date", ""],
        ["From → To", ""],
        ["Dist", "num"],
        ["Elev↑", "num"],
        ["Weather", ""],
        ["Stay", ""],
      ];

      function buildPlanWidget(plan) {
        const wrapper = document.createElement("details");
        wrapper.className = "inline-plan";
        wrapper.open = true;
        const summaryEl = document.createElement("summary");
        summaryEl.textContent = "Itinerary";
        wrapper.append(summaryEl);
        if (plan.summary) {
          const p = document.createElement("p");
          p.className = "summary-text";
          p.textContent = plan.summary;
          wrapper.append(p);
        }
        const table = document.createElement("table");
        const thead = document.createElement("thead");
        const headRow = document.createElement("tr");
        for (const [text, cls] of PLAN_HEADERS) {
          const th = document.createElement("th");
          th.textContent = text;
          if (cls) th.className = cls;
          headRow.append(th);
        }
        thead.append(headRow);
        const tbody = document.createElement("tbody");
        for (const seg of plan.segments || []) tbody.append(buildPlanRow(seg));
        table.append(thead, tbody);
        wrapper.append(table);
        return wrapper;
      }

      let conversationId = null;
      let lastPlanJson = null;

      function addMessage(role, text) {
        const el = document.createElement("div");
        el.className = "msg " + role;
        const roleEl = document.createElement("div");
        roleEl.className = "role";
        roleEl.textContent = role;
        const bodyEl = document.createElement("div");
        bodyEl.textContent = text;
        el.append(roleEl, bodyEl);
        logEl.append(el);
        logEl.scrollTop = logEl.scrollHeight;
      }

      function setConvId(id) {
        conversationId = id;
        convIdEl.textContent = id ? "conv " + id.slice(0, 8) : "no conversation yet";
      }

      resetEl.addEventListener("click", e => {
        e.preventDefault();
        setConvId(null);
        logEl.innerHTML = "";
        renderPlan(null);
        lastPlanJson = null;
        inputEl.focus();
      });

      async function send(message) {
        const body = { message };
        if (conversationId) body.conversationId = conversationId;

        const res = await fetch("/chat", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(body),
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          const detail = data && (data.error || data.message) ? JSON.stringify(data) : res.statusText;
          throw new Error(res.status + " " + detail);
        }
        return data;
      }

      formEl.addEventListener("submit", async e => {
        e.preventDefault();
        const text = inputEl.value.trim();
        if (!text) return;

        inputEl.value = "";
        sendEl.disabled = true;
        addMessage("user", text);

        try {
          const data = await send(text);
          if (data.conversationId) setConvId(data.conversationId);
          addMessage("assistant", data.assistantMessage ?? "(no reply)");
          if (data.plan) {
            const planJson = JSON.stringify(data.plan);
            if (planJson !== lastPlanJson) {
              logEl.append(buildPlanWidget(data.plan));
              logEl.scrollTop = logEl.scrollHeight;
              lastPlanJson = planJson;
            }
            renderPlan(data.plan);
          }
        } catch (err) {
          addMessage("error", String(err.message || err));
        } finally {
          sendEl.disabled = false;
          inputEl.focus();
        }
      });

      inputEl.addEventListener("keydown", e => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          formEl.requestSubmit();
        }
      });
    </script>
  </body>
</html>
